<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業界創舉 · 模擬動畫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #050508;
      color: #e0e0e0;
      overflow: hidden;
    }
    
    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      z-index: 100;
      background: linear-gradient(180deg, rgba(5,5,8,0.9) 0%, transparent 100%);
    }
    .nav-btn {
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #888;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }
    .nav-btn:hover, .nav-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    
    /* Slides container */
    .slides { position: relative; height: 100vh; }
    .slide {
      position: absolute;
      inset: 0;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.8s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 20px;
    }
    .slide.active { opacity: 1; }
    
    /* Title */
    .slide-title {
      text-align: center;
      margin-bottom: 24px;
    }
    .slide-title h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .slide-title p {
      font-size: 16px;
      color: #888;
    }
    
    /* Canvas container */
    .canvas-wrap {
      position: relative;
      width: min(900px, 95vw);
      height: min(506px, 53vw);
      aspect-ratio: 16/9;
      background: #0a0a12;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .canvas-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Legend */
    .legend {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: #888;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    
    /* Controls */
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .ctrl-btn {
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .ctrl-btn:hover { border-color: #fff; color: #fff; }
    
    /* Colors per slide */
    :root { --accent: #f0883e; }
    .slide:nth-child(2) { --accent: #667eea; }
    .slide:nth-child(3) { --accent: #a55eea; }
    
    /* Progress bar */
    .progress {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .progress-dot.active {
      background: #fff;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <div class="nav">
    <button class="nav-btn active" data-slide="0">① LiDAR 光打施工查驗</button>
    <button class="nav-btn" data-slide="1">② 4D 付款進度比對</button>
    <button class="nav-btn" data-slide="2">③ AR/MR 交屋驗收</button>
  </div>
  
  <div class="slides">
    <!-- Slide 1: LiDAR -->
    <div class="slide active">
      <div class="slide-title">
        <h1>📡 LiDAR 光打施工查驗</h1>
        <p>定期掃瞄 → 點雲生成 → BIM 自動比對</p>
      </div>
      <div class="canvas-wrap">
        <canvas id="lidar"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div>LiDAR 掃瞄光束</div>
        <div class="legend-item"><div class="legend-dot" style="background:#667eea"></div>BIM 模型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div>偏差警示</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="lidar-replay">重新播放</button>
      </div>
    </div>
    
    <!-- Slide 2: 4D Payment -->
    <div class="slide">
      <div class="slide-title">
        <h1>💰 4D 付款進度比對</h1>
        <p>BIM 模型驗證進度 → 綁定消費者繳款</p>
      </div>
      <div class="canvas-wrap">
        <canvas id="payment"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#667eea"></div>已完成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#333"></div>未完成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>已驗證付款</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="payment-replay">重新播放</button>
      </div>
    </div>
    
    <!-- Slide 3: AR Handover -->
    <div class="slide">
      <div class="slide-title">
        <h1>🥽 AR/MR 交屋驗收</h1>
        <p>BIM 疊加真實空間 → 毫米級自動比對</p>
      </div>
      <div class="canvas-wrap">
        <canvas id="ar"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>合格</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div>偏差警示</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(102,126,234,0.5)"></div>BIM 疊加層</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="ar-replay">重新播放</button>
      </div>
    </div>
  </div>
  
  <div class="progress">
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>
  
  <script>
    // ========== NAVIGATION ==========
    const slides = document.querySelectorAll('.slide');
    const navBtns = document.querySelectorAll('.nav-btn');
    const progressDots = document.querySelectorAll('.progress-dot');
    
    function showSlide(idx) {
      slides.forEach(s => s.classList.remove('active'));
      navBtns.forEach(b => b.classList.remove('active'));
      progressDots.forEach(d => d.classList.remove('active'));
      slides[idx].classList.add('active');
      navBtns[idx].classList.add('active');
      progressDots[idx].classList.add('active');
    }
    
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => showSlide(parseInt(btn.dataset.slide)));
    });
    
    // ========== SLIDE 1: LiDAR ==========
    (function() {
      const canvas = document.getElementById('lidar');
      const ctx = canvas.getContext('2d');
      let anim, phase = 0, frame = 0;
      
      function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = r.width * 2;
        canvas.height = r.height * 2;
        ctx.setTransform(2, 0, 0, 2, 0, 0);
      }
      window.addEventListener('resize', resize);
      setTimeout(resize, 100);
      
      // Building wireframe points
      const building = {
        floors: 5,
        width: 200,
        height: 250,
        x: 400,
        y: 300
      };
      
      // LiDAR scanner position
      const scanner = { x: 200, y: 350 };
      
      // Point cloud
      let points = [];
      let scanAngle = 0;
      let scanLines = [];
      
      function drawBuilding() {
        ctx.strokeStyle = 'rgba(102,126,234,0.3)';
        ctx.lineWidth = 1;
        const {x, y, width, height, floors} = building;
        const floorH = height / floors;
        const w = width / 2;
        
        // Draw each floor
        for (let i = 0; i <= floors; i++) {
          const fy = y - (i * floorH);
          ctx.beginPath();
          ctx.moveTo(x - w, fy);
          ctx.lineTo(x + w, fy);
          ctx.stroke();
        }
        // Vertical lines
        ctx.beginPath();
        ctx.moveTo(x - w, y);
        ctx.lineTo(x - w, y - height);
        ctx.moveTo(x + w, y);
        ctx.lineTo(x + w, y - height);
        ctx.stroke();
        
        // Windows
        ctx.strokeStyle = 'rgba(102,126,234,0.15)';
        for (let f = 0; f < floors; f++) {
          for (let w = 0; w < 3; w++) {
            const wx = x - 60 + w * 60;
            const wy = y - (f + 1) * floorH + 15;
            ctx.strokeRect(wx, wy, 40, floorH - 20);
          }
        }
      }
      
      function drawScanner() {
        // Scanner base
        ctx.fillStyle = '#f0883e';
        ctx.beginPath();
        ctx.arc(scanner.x, scanner.y, 12, 0, Math.PI * 2);
        ctx.fill();
        
        // Pulse ring
        const pulse = (Math.sin(frame * 0.1) + 1) * 0.5;
        ctx.strokeStyle = `rgba(240,136,62,${0.3 + pulse * 0.4})`;
        ctx.beginPath();
        ctx.arc(scanner.x, scanner.y, 12 + pulse * 15, 0, Math.PI * 2);
        ctx.stroke();
        
        // Label
        ctx.fillStyle = '#f0883e';
        ctx.font = '12px sans-serif';
        ctx.fillText('LiDAR', scanner.x - 18, scanner.y + 28);
      }
      
      function drawScanBeam() {
        // Rotating beam from scanner
        scanAngle += 0.03;
        const beamLen = 350;
        const endX = scanner.x + Math.cos(scanAngle) * beamLen;
        const endY = scanner.y + Math.sin(scanAngle) * beamLen;
        
        // Beam line
        const grad = ctx.createLinearGradient(scanner.x, scanner.y, endX, endY);
        grad.addColorStop(0, 'rgba(240,136,62,0.8)');
        grad.addColorStop(1, 'rgba(240,136,62,0)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(scanner.x, scanner.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        // Cone effect
        ctx.fillStyle = 'rgba(240,136,62,0.05)';
        ctx.beginPath();
        ctx.moveTo(scanner.x, scanner.y);
        ctx.arc(scanner.x, scanner.y, beamLen, scanAngle - 0.15, scanAngle + 0.15);
        ctx.fill();
        
        // Add points when beam hits building
        if (frame % 3 === 0) {
          const hitX = scanner.x + Math.cos(scanAngle) * 250 + (Math.random() - 0.5) * 30;
          const hitY = scanner.y + Math.sin(scanAngle) * 200 - Math.random() * 150;
          if (hitX > 300 && hitX < 500 && hitY > 100 && hitY < 400) {
            points.push({x: hitX, y: hitY, alpha: 1});
            if (points.length > 200) points.shift();
          }
        }
      }
      
      function drawPoints() {
        points.forEach(p => {
          ctx.fillStyle = `rgba(240,136,62,${p.alpha * 0.7})`;
          ctx.fillRect(p.x, p.y, 2, 2);
          p.alpha *= 0.998;
        });
      }
      
      function drawDeviation() {
        // Show some deviation markers
        if (frame > 120) {
          const dev = Math.min((frame - 120) / 60, 1);
          ctx.strokeStyle = `rgba(255,77,77,${dev * 0.8})`;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.strokeRect(430, 150, 40, 30);
          ctx.setLineDash([]);
          
          ctx.fillStyle = `rgba(255,77,77,${dev})`;
          ctx.font = '11px sans-serif';
          ctx.fillText('⚠ +2.3cm', 435, 145);
          
          ctx.fillStyle = `rgba(76,175,80,${dev})`;
          ctx.fillText('✓ 合格', 350, 200);
        }
      }
      
      function drawStatus() {
        ctx.fillStyle = 'rgba(5,5,8,0.8)';
        ctx.fillRect(10, 10, 200, 60);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.strokeRect(10, 10, 200, 60);
        
        ctx.fillStyle = '#f0883e';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText('掃瞄進度', 20, 30);
        
        const pct = Math.min(frame / 300, 1);
        ctx.fillStyle = '#333';
        ctx.fillRect(20, 40, 170, 10);
        ctx.fillStyle = '#f0883e';
        ctx.fillRect(20, 40, 170 * pct, 10);
        
        ctx.fillStyle = '#888';
        ctx.font = '11px sans-serif';
        ctx.fillText(`${Math.floor(pct * 100)}%`, 160, 50);
        
        ctx.fillStyle = '#667eea';
        ctx.fillText(`已掃描 ${points.length} 點`, 20, 65);
      }
      
      function animate() {
        const w = canvas.width / 2, h = canvas.height / 2;
        ctx.clearRect(0, 0, w, h);
        
        // Background grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let i = 0; i < w; i += 30) {
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
        }
        for (let i = 0; i < h; i += 30) {
          ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
        }
        
        drawBuilding();
        drawScanner();
        drawScanBeam();
        drawPoints();
        drawDeviation();
        drawStatus();
        
        frame++;
        anim = requestAnimationFrame(animate);
      }
      
      animate();
      
      document.getElementById('lidar-replay').addEventListener('click', () => {
        cancelAnimationFrame(anim);
        frame = 0;
        points = [];
        scanAngle = 0;
        animate();
      });
    })();
    
    // ========== SLIDE 2: 4D Payment ==========
    (function() {
      const canvas = document.getElementById('payment');
      const ctx = canvas.getContext('2d');
      let anim, frame = 0;
      
      function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = r.width * 2;
        canvas.height = r.height * 2;
        ctx.setTransform(2, 0, 0, 2, 0, 0);
      }
      window.addEventListener('resize', resize);
      setTimeout(resize, 100);
      
      const milestones = [
        { name: '基礎完成', progress: 0, verified: false, x: 150 },
        { name: '一樓結構', progress: 0, verified: false, x: 250 },
        { name: '結構封頂', progress: 0, verified: false, x: 350 },
        { name: '外牆完成', progress: 0, verified: false, x: 450 },
        { name: '內裝完成', progress: 0, verified: false, x: 550 },
        { name: '交屋', progress: 0, verified: false, x: 650 }
      ];
      
      function drawBuilding() {
        const x = 150, y = 280;
        const maxH = 200, w = 200;
        
        // Draw building based on current progress
        milestones.forEach((m, i) => {
          const floorH = maxH / 6;
          if (m.progress > 0) {
            const fillH = floorH * m.progress;
            const fy = y - (i + 1) * floorH + (floorH - fillH);
            
            ctx.fillStyle = m.verified ? 'rgba(76,175,80,0.3)' : 'rgba(102,126,234,0.3)';
            ctx.fillRect(x, fy, w, fillH);
            ctx.strokeStyle = m.verified ? 'rgba(76,175,80,0.6)' : 'rgba(102,126,234,0.6)';
            ctx.strokeRect(x, fy, w, fillH);
            
            // Windows
            if (m.progress >= 0.5) {
              ctx.strokeStyle = 'rgba(255,255,255,0.1)';
              ctx.strokeRect(x + 20, fy + 10, 30, 15);
              ctx.strokeRect(x + 60, fy + 10, 30, 15);
              ctx.strokeRect(x + 100, fy + 10, 30, 15);
            }
          }
        });
      }
      
      function drawMilestones() {
        const y = 40;
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.moveTo(100, y);
        ctx.lineTo(700, y);
        ctx.stroke();
        
        milestones.forEach((m, i) => {
          // Progress circle
          ctx.beginPath();
          ctx.arc(m.x, y, 16, 0, Math.PI * 2);
          ctx.fillStyle = m.verified ? '#4caf50' : (m.progress > 0 ? '#667eea' : '#333');
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.2)';
          ctx.stroke();
          
          // Icon
          if (m.verified) {
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.fillText('✓', m.x - 6, y + 6);
          } else if (m.progress > 0) {
            ctx.fillStyle = '#fff';
            ctx.font = '11px sans-serif';
            ctx.fillText(`${Math.floor(m.progress * 100)}%`, m.x - 14, y + 4);
          } else {
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.fillText(i + 1, m.x - 3, y + 4);
          }
          
          // Name
          ctx.fillStyle = m.verified ? '#4caf50' : '#888';
          ctx.font = '11px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(m.name, m.x, y + 30);
          ctx.textAlign = 'left';
        });
      }
      
      function drawPhone() {
        const px = 720, py = 80;
        // Phone frame
        ctx.fillStyle = '#1a1a24';
        ctx.beginPath();
        ctx.roundRect(px, py, 120, 240, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.stroke();
        
        // Screen
        ctx.fillStyle = '#0a0a14';
        ctx.beginPath();
        ctx.roundRect(px + 5, py + 20, 110, 200, 8);
        ctx.fill();
        
        // Screen content
        ctx.fillStyle = '#667eea';
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText('BIM 進度', px + 10, py + 35);
        
        // Progress bars
        milestones.slice(0, 4).forEach((m, i) => {
          const barY = py + 45 + i * 22;
          ctx.fillStyle = '#222';
          ctx.fillRect(px + 10, barY, 100, 8);
          ctx.fillStyle = m.verified ? '#4caf50' : (m.progress > 0 ? '#667eea' : '#333');
          ctx.fillRect(px + 10, barY, 100 * m.progress, 8);
          
          ctx.fillStyle = '#888';
          ctx.font = '9px sans-serif';
          ctx.fillText(`${m.name}`, px + 10, barY + 18);
        });
        
        // Payment status
        ctx.fillStyle = '#4caf50';
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText('✅ 已驗證付款', px + 10, py + 140);
        
        ctx.fillStyle = '#888';
        ctx.font = '9px sans-serif';
        ctx.fillText('NT$ 1,250,000', px + 10, py + 155);
        ctx.fillText('2026/06/21', px + 10, py + 168);
      }
      
      function animate() {
        const w = canvas.width / 2, h = canvas.height / 2;
        ctx.clearRect(0, 0, w, h);
        
        // Background grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        for (let i = 0; i < w; i += 30) {
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
        }
        for (let i = 0; i < h; i += 30) {
          ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
        }
        
        // Animate milestones
        milestones.forEach((m, i) => {
          if (frame > i * 50 && m.progress < 1) {
            m.progress = Math.min(m.progress + 0.02, 1);
          }
          if (m.progress >= 1 && !m.verified && frame > i * 50 + 60) {
            m.verified = true;
          }
        });
        
        drawMilestones();
        drawBuilding();
        drawPhone();
        
        // Title
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('4D 付款進度驗證', 20, 30);
        
        ctx.fillStyle = '#888';
        ctx.font = '12px sans-serif';
        ctx.fillText('BIM 模型自動確認 → 消費者繳款綁定', 20, 50);
        
        frame++;
        anim = requestAnimationFrame(animate);
      }
      
      animate();
      
      document.getElementById('payment-replay').addEventListener('click', () => {
        cancelAnimationFrame(anim);
        frame = 0;
        milestones.forEach(m => { m.progress = 0; m.verified = false; });
        animate();
      });
    })();
    
    // ========== SLIDE 3: AR Handover ==========
    (function() {
      const canvas = document.getElementById('ar');
      const ctx = canvas.getContext('2d');
      let anim, frame = 0;
      
      function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        canvas.width = r.width * 2;
        canvas.height = r.height * 2;
        ctx.setTransform(2, 0, 0, 2, 0, 0);
      }
      window.addEventListener('resize', resize);
      setTimeout(resize, 100);
      
      // AR View elements
      const room = {
        walls: [
          { x1: 150, y1: 100, x2: 150, y2: 300 },
          { x1: 150, y1: 300, x2: 650, y2: 300 },
          { x1: 650, y1: 300, x2: 650, y2: 100 },
          { x1: 150, y1: 100, x2: 650, y2: 100 },
        ]
      };
      
      let inspectionItems = [
        { x: 300, y: 200, name: '牆面平整', status: 'check', delay: 30 },
        { x: 450, y: 180, name: '管線位置', status: 'check', delay: 80 },
        { x: 250, y: 260, name: '插座高度', status: 'check', delay: 130 },
        { x: 500, y: 250, name: '地板水平', status: 'warn', delay: 180 },
        { x: 400, y: 220, name: '天花板', status: 'check', delay: 230 },
      ];
      
      function drawRoom() {
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        room.walls.forEach(w => {
          ctx.beginPath();
          ctx.moveTo(w.x1, w.y1);
          ctx.lineTo(w.x2, w.y2);
          ctx.stroke();
        });
        
        // Floor texture (subtle)
        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        ctx.fillRect(150, 300, 500, 1);
        
        // Grid lines on floor
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        for (let i = 0; i < 5; i++) {
          const x = 150 + i * 125;
          ctx.beginPath();
          ctx.moveTo(x, 300);
          ctx.lineTo(x, 400);
          ctx.stroke();
        }
      }
      
      function drawAROverlay() {
        // Semi-transparent BIM overlay
        ctx.fillStyle = 'rgba(102,126,234,0.05)';
        ctx.fillRect(150, 100, 500, 200);
        
        // BIM grid
        ctx.strokeStyle = 'rgba(102,126,234,0.15)';
        for (let x = 150; x <= 650; x += 50) {
          ctx.beginPath(); ctx.moveTo(x, 100); ctx.lineTo(x, 300); ctx.stroke();
        }
        for (let y = 100; y <= 300; y += 50) {
          ctx.beginPath(); ctx.moveTo(150, y); ctx.lineTo(650, y); ctx.stroke();
        }
        
        // Corner brackets
        const corners = [[150, 100], [650, 100], [650, 300], [150, 300]];
        ctx.strokeStyle = 'rgba(102,126,234,0.4)';
        ctx.lineWidth = 2;
        corners.forEach(([cx, cy]) => {
          const dx = cx === 150 ? 1 : -1;
          const dy = cy === 100 ? 1 : -1;
          ctx.beginPath();
          ctx.moveTo(cx, cy + dy * 20);
          ctx.lineTo(cx, cy);
          ctx.lineTo(cx + dx * 20, cy);
          ctx.stroke();
        });
      }
      
      function drawInspection() {
        inspectionItems.forEach(item => {
          if (frame < item.delay) return;
          const alpha = Math.min((frame - item.delay) / 30, 1);
          
          const color = item.status === 'warn' ? '#ff4d4d' : '#4caf50';
          const icon = item.status === 'warn' ? '⚠' : '✓';
          
          // Circle
          ctx.beginPath();
          ctx.arc(item.x, item.y, 12, 0, Math.PI * 2);
          ctx.fillStyle = color + '40';
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
          
          // Icon
          ctx.fillStyle = color;
          ctx.font = '12px sans-serif';
          ctx.fillText(icon, item.x - 5, item.y + 4);
          
          // Label
          ctx.fillStyle = color;
          ctx.font = '11px sans-serif';
          ctx.fillText(item.name, item.x + 18, item.y + 4);
          
          // Measurement
          if (frame > item.delay + 20) {
            ctx.fillStyle = '#888';
            ctx.font = '10px sans-serif';
            if (item.status === 'warn') {
              ctx.fillText('-3.2mm', item.x + 18, item.y + 18);
            } else {
              ctx.fillText('+0.5mm', item.x + 18, item.y + 18);
            }
          }
        });
      }
      
      function drawARHUD() {
        // AR HUD frame
        ctx.fillStyle = 'rgba(5,5,8,0.8)';
        ctx.fillRect(10, 10, 180, 80);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.strokeRect(10, 10, 180, 80);
        
        ctx.fillStyle = '#667eea';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText('AR 驗收模式', 20, 28);
        
        // Stats
        ctx.fillStyle = '#888';
        ctx.font = '11px sans-serif';
        ctx.fillText(`檢查項目: ${Math.min(5, Math.max(0, Math.floor((frame - 30) / 40)))}/5`, 20, 48);
        ctx.fillText('BIM 疊加: 啟用', 20, 62);
        ctx.fillText('精度: ±1mm', 20, 78);
        
        // Warning box
        if (frame > 200) {
          ctx.fillStyle = 'rgba(255,77,77,0.1)';
          ctx.fillRect(600, 10, 150, 50);
          ctx.strokeStyle = 'rgba(255,77,77,0.4)';
          ctx.strokeRect(600, 10, 150, 50);
          
          ctx.fillStyle = '#ff4d4d';
          ctx.font = 'bold 11px sans-serif';
          ctx.fillText('⚠ 偏差警示', 610, 25);
          
          ctx.fillStyle = '#888';
          ctx.font = '10px sans-serif';
          ctx.fillText('地板水平 -3.2mm', 610, 40);
          ctx.fillText('超出容許值 ±2mm', 610, 55);
        }
      }
      
      function animate() {
        const w = canvas.width / 2, h = canvas.height / 2;
        ctx.clearRect(0, 0, w, h);
        
        // Background
        ctx.fillStyle = '#08080e';
        ctx.fillRect(0, 0, w, h);
        
        drawRoom();
        drawAROverlay();
        drawInspection();
        drawARHUD();
        
        // Scanning line effect
        if (frame % 60 < 30) {
          const scanY = 100 + ((frame % 60) / 30) * 200;
          ctx.strokeStyle = 'rgba(102,126,234,0.3)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(150, scanY);
          ctx.lineTo(650, scanY);
          ctx.stroke();
        }
        
        frame++;
        anim = requestAnimationFrame(animate);
      }
      
      animate();
      
      document.getElementById('ar-replay').addEventListener('click', () => {
        cancelAnimationFrame(anim);
        frame = 0;
        animate();
      });
    })();
  </script>
</body>
</html>
