<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業界創舉 · 模擬動畫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #050508;
      color: #e0e0e0;
      overflow: hidden;
    }
    
    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      z-index: 100;
      background: linear-gradient(180deg, rgba(5,5,8,0.9) 0%, transparent 100%);
    }
    .nav-btn {
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #888;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }
    .nav-btn:hover, .nav-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    
    /* Slides container */
    .slides { position: relative; height: 100vh; }
    .slide {
      position: absolute;
      inset: 0;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.8s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 20px;
    }
    .slide.active { opacity: 1; }
    
    /* Title */
    .slide-title {
      text-align: center;
      margin-bottom: 24px;
    }
    .slide-title h1 {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .slide-title p {
      font-size: 16px;
      color: #888;
    }
    
    /* Canvas container */
    .video-wrap {
      position: relative;
      width: min(900px, 95vw);
      height: min(506px, 53vw);
      aspect-ratio: 16/9;
      background: #0a0a12;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .video-wrap video {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Legend */
    .legend {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: #888;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    
    /* Controls */
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .ctrl-btn {
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .ctrl-btn:hover { border-color: #fff; color: #fff; }
    
    /* Colors per slide */
    :root { --accent: #f0883e; }
    .slide:nth-child(2) { --accent: #667eea; }
    .slide:nth-child(3) { --accent: #a55eea; }
    
    /* Progress bar */
    .progress {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .progress-dot.active {
      background: #fff;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <div class="nav">
    <button class="nav-btn active" data-slide="0">① LiDAR 光打施工查驗</button>
    <button class="nav-btn" data-slide="1">② 4D 付款進度比對</button>
    <button class="nav-btn" data-slide="2">③ AR/MR 交屋驗收</button>
  </div>
  
  <div class="slides">
    <!-- Slide 1: LiDAR -->
    <div class="slide active">
      <div class="slide-title">
        <h1>📡 LiDAR 光打施工查驗</h1>
        <p>定期掃瞄 → 點雲生成 → BIM 自動比對</p>
      </div>
      <div class="video-wrap">
        <video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
          <source src="videos/lidar_inspection.mp4" type="video/mp4">
        </video>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div>LiDAR 掃瞄光束</div>
        <div class="legend-item"><div class="legend-dot" style="background:#667eea"></div>BIM 模型</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div>偏差警示</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="lidar-replay">重新播放</button>
      </div>
    </div>
    
    <!-- Slide 2: 4D Payment -->
    <div class="slide">
      <div class="slide-title">
        <h1>💰 4D 付款進度比對</h1>
        <p>BIM 模型驗證進度 → 綁定消費者繳款</p>
      </div>
      <div class="video-wrap">
        <video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
          <source src="videos/payment_progress.mp4" type="video/mp4">
        </video>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#667eea"></div>已完成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#333"></div>未完成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>已驗證付款</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="payment-replay">重新播放</button>
      </div>
    </div>
    
    <!-- Slide 3: AR Handover -->
    <div class="slide">
      <div class="slide-title">
        <h1>🥽 AR/MR 交屋驗收</h1>
        <p>BIM 疊加真實空間 → 毫米級自動比對</p>
      </div>
      <div class="video-wrap">
        <video autoplay loop muted playsinline style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
          <source src="videos/ar_handover.mp4" type="video/mp4">
        </video>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>合格</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div>偏差警示</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(102,126,234,0.5)"></div>BIM 疊加層</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="ar-replay">重新播放</button>
      </div>
    </div>
  </div>
  
  <div class="progress">
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>
  
  <script>
    const slides = document.querySelectorAll('.slide');
    const tabs = document.querySelectorAll('.tab');
    function showSlide(idx) {
      slides.forEach((s, i) => s.classList.toggle('active', i === idx));
      tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
      // Play video for active slide
      const videos = document.querySelectorAll('video');
      videos.forEach((v, i) => i === idx ? v.play() : v.pause());
    }
    tabs.forEach((tab, i) => tab.addEventListener('click', () => showSlide(i)));
    showSlide(0);
    </script>
</body>
</html>
