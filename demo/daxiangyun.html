<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC PRISM × 大象雲 | BIM 3D Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang TC', sans-serif; background: #0a0a12; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 24px; background: rgba(10,10,18,0.95); border-bottom: 1px solid rgba(102,126,234,0.15); display: flex; align-items: center; gap: 16px; z-index: 10; }
  header .brand { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #667eea, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header .sep { color: #333; }
  header .title { font-size: 15px; color: #8899bb; }
  .toolbar { display: flex; gap: 6px; margin-left: auto; }
  .toolbar button { padding: 6px 14px; border: 1px solid rgba(102,126,234,0.2); border-radius: 6px; background: rgba(102,126,234,0.08); color: #8899ff; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .toolbar button:hover { background: rgba(102,126,234,0.18); color: #fff; }
  .toolbar button.active { background: rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.4); color: #fff; }
  #viewer-container { flex: 1; position: relative; }
  #viewer-container iframe { width: 100%; height: 100%; border: none; }
  .info-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,18,0.85); border: 1px solid rgba(102,126,234,0.15); border-radius: 10px; padding: 10px 20px; font-size: 13px; color: #667eea; z-index: 5; pointer-events: none; }
</style>
</head>
<body>
<header>
  <span class="brand">AEC PRISM</span>
  <span class="sep">×</span>
  <span class="title">大象雲 SME 3D 模型瀏覽器</span>
  <div class="toolbar">
    <button data-view="full" class="active">全景</button>
    <button data-view="top">俯瞰</button>
    <button data-view="front">正面</button>
    <button data-view="section">剖面</button>
  </div>
</header>
<div id="viewer-container">
  <iframe id="viewer" allow="clipboard-write"></iframe>
  <div class="info-bar">🖱️ 滑鼠拖曳旋轉 · 滾輪縮放 · 右鍵平移</div>
</div>

<script>
(function() {
  // 大象雲 SME public viewer
  var viewerServer = 'http://220.128.101.122:9000';
  var modelPath = 'richard/dem/models/villa'; // Try existing demo model path
  var viewer = document.getElementById('viewer');
  
  viewer.src = viewerServer + '/viewer.html?path=' + encodeURIComponent(modelPath);

  // View controls via postMessage to iframe
  document.querySelectorAll('.toolbar button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.toolbar button').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      var view = this.dataset.view;
      viewer.contentWindow.postMessage({ type: 'setView', view: view }, '*');
    });
  });
})();
</script>
</body>
</html>
