<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEC Prism</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #050508;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Full-page prism background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.7;
    }

    /* Center content overlay */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    /* Logo lockup */
    .logo-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Prism icon (small, above text) */
    .logo-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 0.8rem;
      filter: drop-shadow(0 0 12px rgba(102,126,234,0.4));
    }

    .logo-text {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 60%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1;
    }

    .tagline {
      margin-top: 1rem;
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(102,126,234,0.5), transparent);
      margin: 1.5rem auto;
    }

    .coming-soon {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.4em;
    }

    /* Subtle vignette to keep text readable */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(5,5,8,0.7) 80%);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Full-page prism refraction background -->
  <svg class="bg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ff4d4d"/>
        <stop offset="17%" stop-color="#ff9f43"/>
        <stop offset="33%" stop-color="#feca57"/>
        <stop offset="50%" stop-color="#48dbfb"/>
        <stop offset="67%" stop-color="#667eea"/>
        <stop offset="83%" stop-color="#a55eea"/>
        <stop offset="100%" stop-color="#f093fb"/>
      </linearGradient>
      <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="12" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="bigGlow">
        <feGaussianBlur stdDeviation="20" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Ambient background glow -->
    <rect width="1920" height="1080" fill="#050508"/>
    <ellipse cx="800" cy="540" rx="600" ry="400" fill="rgba(102,126,234,0.03)" filter="url(#bigGlow)"/>

    <!-- White light beam from far left -->
    <line x1="-100" y1="540" x2="800" y2="540" stroke="url(#beam)" stroke-width="8" filter="url(#glow)"/>
    <line x1="-100" y1="540" x2="800" y2="540" stroke="#fff" stroke-width="3"/>

    <!-- Glass prism triangle -->
    <polygon points="860,280 960,800 760,800"
      fill="rgba(255,255,255,0.015)"
      stroke="rgba(255,255,255,0.12)" stroke-width="2" filter="url(#softGlow)"/>
    <polygon points="860,280 960,800 760,800"
      fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Spectrum rays fanning out to the right -->
    <g filter="url(#bigGlow)" opacity="0.35">
      <line x1="880" y1="555" x2="2100" y2="200" stroke="#ff4d4d" stroke-width="6"/>
      <line x1="880" y1="570" x2="2100" y2="300" stroke="#ff9f43" stroke-width="6"/>
      <line x1="880" y1="585" x2="2100" y2="400" stroke="#feca57" stroke-width="6"/>
      <line x1="880" y1="600" x2="2100" y2="500" stroke="#48dbfb" stroke-width="6"/>
      <line x1="880" y1="615" x2="2100" y2="600" stroke="#667eea" stroke-width="6"/>
      <line x1="880" y1="630" x2="2100" y2="700" stroke="#a55eea" stroke-width="6"/>
      <line x1="880" y1="645" x2="2100" y2="800" stroke="#f093fb" stroke-width="6"/>
    </g>

    <!-- Sharper inner spectrum lines -->
    <g opacity="0.25">
      <line x1="880" y1="555" x2="2100" y2="200" stroke="#ff4d4d" stroke-width="2.5"/>
      <line x1="880" y1="570" x2="2100" y2="300" stroke="#ff9f43" stroke-width="2.5"/>
      <line x1="880" y1="585" x2="2100" y2="400" stroke="#feca57" stroke-width="2.5"/>
      <line x1="880" y1="600" x2="2100" y2="500" stroke="#48dbfb" stroke-width="2.5"/>
      <line x1="880" y1="615" x2="2100" y2="600" stroke="#667eea" stroke-width="2.5"/>
      <line x1="880" y1="630" x2="2100" y2="700" stroke="#a55eea" stroke-width="2.5"/>
      <line x1="880" y1="645" x2="2100" y2="800" stroke="#f093fb" stroke-width="2.5"/>
    </g>

    <!-- Subtle building wireframes (architectural hint) -->
    <g opacity="0.04" stroke="#fff" stroke-width="1">
      <line x1="100" y1="750" x2="100" y2="900"/>
      <line x1="150" y1="720" x2="150" y2="900"/>
      <line x1="100" y1="750" x2="150" y2="720"/>
      <line x1="150" y1="720" x2="200" y2="760"/>
      <line x1="200" y1="760" x2="200" y2="900"/>
      <line x1="150" y1="780" x2="200" y2="760"/>

      <line x1="250" y1="700" x2="250" y2="900"/>
      <line x1="310" y1="670" x2="310" y2="900"/>
      <line x1="250" y1="700" x2="310" y2="670"/>
      <line x1="310" y1="670" x2="370" y2="720"/>
      <line x1="370" y1="720" x2="370" y2="900"/>
      <line x1="310" y1="750" x2="370" y2="720"/>

      <line x1="1700" y1="680" x2="1700" y2="900"/>
      <line x1="1760" y1="650" x2="1760" y2="900"/>
      <line x1="1700" y1="680" x2="1760" y2="650"/>
      <line x1="1760" y1="650" x2="1820" y2="700"/>
      <line x1="1820" y1="700" x2="1820" y2="900"/>
    </g>
  </svg>

  <!-- Vignette overlay for readability -->
  <div class="vignette"></div>

  <!-- Center content -->
  <div class="container">
    <div class="logo-wrap">
      <!-- Logo icon: small prism -->
      <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#667eea"/>
            <stop offset="50%" stop-color="#a55eea"/>
            <stop offset="100%" stop-color="#f093fb"/>
          </linearGradient>
        </defs>
        <!-- Prism triangle -->
        <polygon points="32,6 56,54 8,54" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
        <!-- White beam entering -->
        <line x1="0" y1="36" x2="30" y2="36" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
        <!-- Spectrum exit -->
        <line x1="34" y1="38" x2="62" y2="22" stroke="#ff4d4d" stroke-width="1.5" opacity="0.6"/>
        <line x1="34" y1="42" x2="62" y2="32" stroke="#feca57" stroke-width="1.5" opacity="0.6"/>
        <line x1="34" y1="46" x2="62" y2="42" stroke="#667eea" stroke-width="1.5" opacity="0.6"/>
        <line x1="34" y1="50" x2="62" y2="52" stroke="#f093fb" stroke-width="1.5" opacity="0.6"/>
      </svg>

      <div class="logo-text">AEC PRISM</div>
    </div>
    <div class="tagline">Where Building Data Refracts Into Decisions</div>
    <div class="divider"></div>
    <div class="coming-soon">Coming Soon</div>
  </div>

</body>
</html>
