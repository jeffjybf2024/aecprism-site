<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="35%" stop-color="#764ba2"/>
      <stop offset="70%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.7)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- White beam -->
  <line x1="0" y1="300" x2="400" y2="300" stroke="url(#beamGrad)" stroke-width="2"/>
  <!-- Prism -->
  <polygon points="440,140 520,500 360,500" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Spectrum -->
  <line x1="460" y1="350" x2="1100" y2="180" stroke="#ff4d4d" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="370" x2="1100" y2="270" stroke="#ff9f43" stroke-width="2" opacity="0.55"/>
  <line x1="460" y1="390" x2="1100" y2="340" stroke="#feca57" stroke-width="2" opacity="0.5"/>
  <line x1="460" y1="410" x2="1100" y2="410" stroke="#48dbfb" stroke-width="2" opacity="0.55"/>
  <line x1="460" y1="430" x2="1100" y2="480" stroke="#667eea" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="450" x2="1100" y2="540" stroke="#a55eea" stroke-width="2" opacity="0.55"/>
  <line x1="460" y1="470" x2="1100" y2="600" stroke="#f093fb" stroke-width="2" opacity="0.5"/>
  <!-- Text -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="72" font-weight="700" letter-spacing="10" fill="url(#textGrad)" filter="drop-shadow(0 4px 12px rgba(102,126,234,0.3))">AEC PRISM</text>
  <text x="600" y="370" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="24" fill="#6a6a7a" letter-spacing="2" font-weight="300">BIM Model → Prism → Decisions</text>
</svg>
